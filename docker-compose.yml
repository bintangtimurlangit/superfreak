services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - mongo
      - redis
      - superslice
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://mongo:27017/superfreak
      - REDIS_URL=redis://redis:6379
      # Server-side only: Next.js API /api/slice proxies to this URL (not exposed to browser)
      - SUPERSLICE_API_URL=http://superslice:8000
    restart: unless-stopped
    networks:
      - app-network

  superslice:
    image: ghcr.io/bintangtimurlangit/superslice:latest
    container_name: superslice
    ports:
      - "8000:8000"
    environment:
      - SLICE_TIMEOUT=120
      - MAX_FILE_SIZE=104857600
      - CORS_ORIGINS=*
    volumes:
      - superslice_uploads:/app/uploads
      - superslice_output:/app/output
    restart: unless-stopped
    networks:
      - app-network

  mongo:
    image: mongo:latest
    command:
      - --storageEngine=wiredTiger
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - app-network

  # Mongo Express: DB admin UI. Do NOT expose 8081 to the public (0.0.0.0).
  # - Local dev: use "ports: - '127.0.0.1:8081:8081'" then open http://localhost:8081
  # - Production: use 127.0.0.1:8081:8081 and access via SSH tunnel (ssh -L 8081:127.0.0.1:8081 user@server), or put behind Cloudflare Zero Trust with auth
  mongo-express:
    image: mongo-express
    restart: always
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: supersecret123
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    networks:
      - app-network

volumes:
  mongo_data:
  redis_data:
  superslice_uploads:
  superslice_output:

networks:
  app-network:
    driver: bridge